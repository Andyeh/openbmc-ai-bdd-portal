[behave]
paths = tests/bdd/features
steps_dir = tests/bdd/features/steps

# Output formats
format = pretty

# Tags
# Run only @wip scenarios:  behave --tags @wip
# Skip slow scenarios:      behave --tags ~@slow

# Logging
logging_level = INFO
logging_clear_handlers = yes

# Stop at first failure
# stop = true
